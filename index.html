  <!-- JavaScript for typing animation and nav -->
  <script>
    // typing animation for code box
    const codeLines = [
      { html: '<span class="hello-color"><em># hello there! </em></span>', raw: '# hello there! ' },
      { html: '<span class="code-keyword">if</span> <span class="code-variable">your_interest</span> <span class="code-keyword">in</span> [', raw: 'if your_interest in [' },
      { html: '    <span class="code-string">"backend software"</span>,', raw: '    "backend software",' },
      { html: '    <span class="code-string">"informatics"</span>,', raw: '    "informatics",' },
      { html: '    <span class="code-string">"organizations and IT"</span>,', raw: '    "organizations and IT",' },
      { html: '    <span class="code-string">"design"</span>', raw: '    "design"' },
      { html: '    ] :', raw: '    ] :' }
    ];

    const typedCode = document.getElementById("typed-code");
    const exploreLine = document.getElementById("explore-line");
    let lineIndex = 0;
    let charIndex = 0;
    let currentLineEl = null;

    function typeNextChar() {
      if (lineIndex >= codeLines.length) {
        exploreLine.style.visibility = "visible";
        return;
      }

      const line = codeLines[lineIndex];

      if (charIndex === 0) {
        currentLineEl = document.createElement("p");
        if (lineIndex === 0) {
          // no indent for comment line
        } else if (lineIndex >= 2) {
          currentLineEl.className = "indented";
        }
        typedCode.appendChild(currentLineEl);
      }

      charIndex++;
      // Build the displayed text by taking raw chars up to charIndex, then map to styled HTML
      const visibleRaw = line.raw.substring(0, charIndex);
      // Replace the raw substring with the corresponding styled HTML, truncated
      currentLineEl.innerHTML = buildStyledSubstring(line, charIndex) + '<span class="typing-cursor">|</span>';

      if (charIndex < line.raw.length) {
        setTimeout(typeNextChar, 45);
      } else {
        // Remove cursor from finished line
        currentLineEl.innerHTML = line.html;
        lineIndex++;
        charIndex = 0;
        setTimeout(typeNextChar, 150);
      }
    }

    function buildStyledSubstring(line, count) {
      // Create a temp element with full HTML, extract text, then truncate
      const temp = document.createElement("div");
      temp.innerHTML = line.html;
      const fullText = temp.textContent;
      const partial = fullText.substring(0, count);

      // Rebuild with styling by walking through the HTML structure
      let result = "";
      let textSoFar = 0;
      const walker = document.createTreeWalker(temp, NodeFilter.SHOW_TEXT);
      let node;
      const fragments = [];

      // Collect all text nodes with their parent styling
      while (node = walker.nextNode()) {
        fragments.push({ text: node.textContent, parent: node.parentElement });
      }

      for (const frag of fragments) {
        if (textSoFar >= count) break;
        const remaining = count - textSoFar;
        const sliced = frag.text.substring(0, remaining);
        textSoFar += sliced.length;

        if (frag.parent === temp) {
          result += sliced;
        } else {
          // Wrap in parent tags
          const clone = frag.parent.cloneNode(false);
          clone.textContent = sliced;
          result += clone.outerHTML;
        }
      }
      return result;
    }

    // Start typing after a brief delay
    setTimeout(typeNextChar, 500);

    // Nav menu logic
    const exploreLink = document.getElementById("explore-link");
    const runBtn = document.getElementById("run-btn");
    const navLinks = document.getElementById("nav-links");
    const runSection = document.getElementById("run-section");
    let menuOpen = false;

    function toggleMenu(open) {
      menuOpen = open;
      runBtn.setAttribute("aria-expanded", open);
      const items = navLinks.querySelectorAll("li");

      if (open) {
        navLinks.classList.add("open");
        items.forEach((item, i) => {
          item.style.transitionDelay = `${i * 80}ms`;
          item.classList.add("visible");
        });
      } else {
        items.forEach((item, i) => {
          item.style.transitionDelay = `${(items.length - 1 - i) * 60}ms`;
          item.classList.remove("visible");
        });
        setTimeout(() => navLinks.classList.remove("open"), items.length * 60 + 200);
      }
    }

    runBtn.addEventListener("click", () => {
      toggleMenu(!menuOpen);
    });

    exploreLink.addEventListener("click", () => {
      toggleMenu(true);
      runSection.scrollIntoView({ behavior: "smooth", block: "start" });
    });

    document.addEventListener("click", (event) => {
      if (menuOpen && !runSection.contains(event.target) && event.target !== exploreLink) {
        toggleMenu(false);
      }
    });
  </script>
