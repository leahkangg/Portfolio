  <!-- JavaScript for nav -->
  <script>
    const runBtn = document.getElementById("run-btn");
    const navLinks = document.getElementById("nav-links");
    const runSection = document.getElementById("run-section");
    let menuOpen = false;

    function toggleMenu(open) {
      menuOpen = open;
      runBtn.setAttribute("aria-expanded", open);
      const items = navLinks.querySelectorAll("li");
      if (open) {
        navLinks.classList.add("open");
        items.forEach((item, i) => { item.style.transitionDelay = `${i * 80}ms`; item.classList.add("visible"); });
      } else {
        items.forEach((item, i) => { item.style.transitionDelay = `${(items.length - 1 - i) * 60}ms`; item.classList.remove("visible"); });
        setTimeout(() => navLinks.classList.remove("open"), items.length * 60 + 200);
      }
    }

    runBtn.addEventListener("click", () => toggleMenu(!menuOpen));
    document.addEventListener("click", (event) => {
      if (menuOpen && !runSection.contains(event.target)) toggleMenu(false);
    });
  </script>
